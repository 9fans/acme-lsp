on: [push, pull_request]
name: Test

jobs:
  test:
    timeout-minutes: 30
    strategy:
      matrix:
        go-version: ['1.25.x', '1.26.x']
        platform: [ubuntu-latest]
      fail-fast: false
    runs-on: ${{ matrix.platform }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
        check-latest: true

    - name: Go environment
      run: |
        go version
        go env
        echo PATH is $PATH
      shell: bash

    - name: Install gopls
      run: go install golang.org/x/tools/gopls@v0.21.1

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "0.10.9"

    - name: Install ty
      run: uv tool install ty@0.0.21

    - name: Install typescript-language-server
      run: sudo npm install -g typescript-language-server@5.1.3 typescript@5.9.3

    - name: Install clangd
      run: sudo apt-get update && sudo apt-get install -y clangd

    - name: Install Dart
      uses: dart-lang/setup-dart@v1
      with:
        sdk: 3.11.2

    - name: Install Rust and rust-analyzer
      run: |
        rustup toolchain install 1.94.0 --profile minimal --component rust-analyzer --component rustfmt
        rustup default 1.94.0

    - name: Check gofmt
      run: |
        gofmt -l .
        test `gofmt -l . | wc -l` = 0
      shell: bash

    - name: Test on unix
      if: matrix.platform != 'windows-latest'
      run: |
        export PATH=${PATH}:$(go env GOPATH)/bin
        go test -race -v ./...
      shell: bash

    - name: Test on windows
      if: matrix.platform == 'windows-latest'
      run: |
        # 8.3 filenames causes issues. See
        # https://github.com/actions/virtual-environments/issues/712
        $env:TMP = "$env:USERPROFILE\AppData\Local\Temp"
        $env:TEMP = "$env:USERPROFILE\AppData\Local\Temp"

        $env:path += ";C:\Users\runneradmin\go\bin"
        go test -race -v ./...

    - name: Cross compile for plan9
      if: matrix.platform == 'ubuntu-latest'
      env:
        GOOS: plan9
      run: go build ./...
